<!DOCTYPE html>
<html lang="pr_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Beans coins</title>
</head>
<body>
    <section>
        <div class="main">
            <div class="left">
                <h3>Beans coins: <span class="coins-cost">0</span></h3>
                 <img src="images/BeansIdle.png" alt="cequezinho lindo" srcset="" class="img-Beans" onclick="incrementCoin()" draggable="false">
              </div>
              <div class="right">
                <div class="upgrade" onclick="buyClicker()">
                    <div class="fist-section">
                        <img src="images/melhoria.png" alt="" class="upgrade-img">
                       </div>
                       <div class="second-section">
                        <h4>Clicker</h4>
                        <div class="info-cost">
                            <p>Preço: <span class="clicker-cost">10</span></p>
                            <img src="images/BeansCoins.png" alt="BeanCoin" class="coin-img">
                        </div>
                    </div>
                    <div class="third-section">
                        level 0
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="game.js"></script>
</body>
</html>
